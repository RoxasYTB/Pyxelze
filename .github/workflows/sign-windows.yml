name: Build and Sign Windows Installer

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.x'

      - name: Publish .NET GUI for Windows
        run: |
          dotnet publish Pyxelze/Pyxelze.csproj -c Release -r win-x64 --self-contained false -p:EnableWindowsTargeting=true -o publish_with_native

      - name: Build Inno Setup installer
        shell: cmd
        run: tools\installer\build_installer.cmd "%CD%\publish_with_native"

      - name: Decode signing certificate (if provided)
        shell: pwsh
        run: |
          if ($env:SIGN_PFX) {
            [IO.File]::WriteAllBytes('cert.pfx',[Convert]::FromBase64String($env:SIGN_PFX))
            Write-Host "cert.pfx written"
          } else {
            Write-Host "No signing PFX provided; skipping"
          }

      - name: Sign installers with signtool (if certificate provided)
        shell: pwsh
        run: |
          if ($env:SIGN_PFX -and $env:SIGN_PFX_PASS) {
            $cert = Join-Path $PWD 'cert.pfx'
            $pass = $env:SIGN_PFX_PASS
            $signtool = '"C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe"'
            Get-ChildItem -Path .\releases\*.exe | ForEach-Object {
              & $signtool sign /fd SHA256 /a /f $cert /p $pass /tr http://timestamp.digicert.com /td SHA256 $_.FullName
            }
          } else {
            Write-Host "SIGN_PFX or SIGN_PFX_PASS missing; skipping signtool signing"
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $out = 'releases\sha256sums.txt'
          if (Test-Path $out) { Remove-Item -Force $out }
          Get-ChildItem -Path .\releases\*.exe | ForEach-Object {
            $h = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash
            "$h  $($_.Name)" | Out-File -FilePath $out -Append -Encoding utf8
          }
          Get-Content $out

      - name: (Optional) Sign checksum file with GPG
        shell: pwsh
        run: |
          $gpgkey = "${{ secrets.SIGN_GPG_KEY }}"
          if ($gpgkey) {
            choco install gnupg -y
            $keyFile = Join-Path $PWD 'gpg.key'
            [IO.File]::WriteAllBytes($keyFile,[Convert]::FromBase64String($gpgkey))
            gpg --batch --import $keyFile
            Remove-Item -Force $keyFile
            $pass = "${{ secrets.SIGN_GPG_PASSPHRASE }}"
            if ($pass) {
              gpg --batch --yes --passphrase $pass --armor --output releases/sha256sums.txt.asc --detach-sign releases/sha256sums.txt
            } else {
              gpg --batch --yes --armor --output releases/sha256sums.txt.asc --detach-sign releases/sha256sums.txt
            }
            Get-Content releases/sha256sums.txt.asc
          } else {
            Write-Host "No GPG key provided; skipping GPG signing"
          }

      - name: (Optional) Submit installers to VirusTotal
        shell: pwsh
        run: |
          $vt = "${{ secrets.VT_API_KEY }}"
          if ($vt) {
            $headers = @{'x-apikey' = $vt}
            Get-ChildItem -Path .\releases\*.exe | ForEach-Object {
              Write-Host "Submitting $_.FullName to VirusTotal"
              $response = Invoke-RestMethod -Uri 'https://www.virustotal.com/api/v3/files' -Headers $headers -Method Post -Body @{file = [System.IO.File]::OpenRead($_.FullName)} -ContentType 'multipart/form-data'
              $id = $response.data.id
              Write-Host "Submitted: $id"
              Start-Sleep -Seconds 5
              $info = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files/$id" -Headers $headers -Method Get
              $stats = $info.data.attributes.last_analysis_stats
              Write-Host "VT analysis for $($_.Name): clean=$($stats.harmless) suspicious=$($stats.suspicious) malicious=$($stats.malicious) undetected=$($stats.undetected)"
            }
          } else {
            Write-Host "VT_API_KEY not provided; skipping VirusTotal submission"
          }

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*.exe,releases/sha256sums.txt,releases/sha256sums.txt.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
