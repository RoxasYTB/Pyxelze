name: Build rox CLI (Windows)

on:
  push:
    paths:
      - 'tools/roxify/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: |
          cd tools/roxify
          npm ci

      - name: Build rox.exe
        run: |
          cd tools/roxify
          npm run build:exe

      - name: Smoke test
        run: |
          cd tools/roxify/dist
          .\rox.exe --version

      - name: Include portable Node in artifact
        run: |
          cd tools/roxify
          $nodeUrl = "https://nodejs.org/dist/v18.18.1/node-v18.18.1-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile node.zip
          Expand-Archive node.zip -DestinationPath node_tmp
          Copy-Item -Path (Join-Path node_tmp "node-v18.18.1-win-x64\node.exe") -Destination (Join-Path "$PWD\dist\node.exe") -Force
          Remove-Item node.zip -Force
          Remove-Item node_tmp -Recurse -Force

      - name: Print failure log if present
        if: always()
        run: |
          powershell -Command "if (Test-Path 'tools/roxify/dist/failure.log') { Write-Host '=== failure.log ==='; Get-Content 'tools/roxify/dist/failure.log'; Write-Host '=== end failure.log ===' } else { Write-Host 'no failure.log' }"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rox-cli-windows
          path: tools/roxify/dist

  make_release:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: |
          cd tools/roxify
          npm ci

      - name: Build rox and copy release
        run: |
          cd tools/roxify
          npm run build:exe
          cd ${{ github.workspace }}
          .\make_release.cmd

      - name: Print failure.log if present
        if: always()
        run: powershell -Command "if (Test-Path 'release\roxify\failure.log') { Write-Host '=== failure.log ==='; Get-Content 'release\roxify\failure.log'; Write-Host '=== end failure.log ===' } else { Write-Host 'no failure.log' }"

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: cmd

      - name: Build installer (Inno Setup)
        run: |
          cd tools\installer
          call build_installer.cmd

      - name: Smoke-install and verify installer
        run: |
          powershell -Command "Start-Process -FilePath 'tools/installer/Pyxelze-Rox-Setup.exe' -ArgumentList '/VERYSILENT','/DIR="$env:TEMP\\rox_test"' -Wait -NoNewWindow"
          powershell -Command "& (Join-Path $env:TEMP 'rox_test\rox.cmd') --version"

      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: rox-cli-release
          path: release/roxify

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: rox-installer
          path: tools/installer/Pyxelze-Rox-Setup.exe
      - name: Create draft GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: roxify-${{ github.run_number }}-${{ github.sha }}
          release_name: 'roxify build ${{ github.run_number }}'
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip release folder
        run: |
          powershell -Command "Compress-Archive -Path 'release/roxify/*' -DestinationPath 'release/roxify.zip' -Force"

      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/roxify.zip
          asset_name: roxify-release.zip
          asset_content_type: application/zip
      - name: Upload installer to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: tools/installer/Pyxelze-Rox-Setup.exe
          asset_name: Pyxelze-Rox-Setup.exe
          asset_content_type: application/x-msdownload
