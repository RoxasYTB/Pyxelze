name: Build rox CLI (Windows)

on:
  push:
    paths:
      - 'tools/roxify/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: |
          cd tools/roxify
          npm ci

      - name: Build rox.exe
        run: |
          cd tools/roxify
          npm run build:exe

      - name: Smoke test
        run: |
          cd tools/roxify/dist
          .\rox.exe --version

      - name: Include portable Node in artifact
        run: |
          cd tools/roxify
          $nodeUrl = "https://nodejs.org/dist/v18.18.1/node-v18.18.1-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile node.zip
          Expand-Archive node.zip -DestinationPath node_tmp
          Copy-Item -Path (Join-Path node_tmp "node-v18.18.1-win-x64\node.exe") -Destination (Join-Path "$PWD\dist\node.exe") -Force
          Remove-Item node.zip -Force
          Remove-Item node_tmp -Recurse -Force

      - name: Print failure log if present
        if: always()
        run: |
          powershell -Command "if (Test-Path 'tools/roxify/dist/failure.log') { Write-Host '=== failure.log ==='; Get-Content 'tools/roxify/dist/failure.log'; Write-Host '=== end failure.log ===' } else { Write-Host 'no failure.log' }"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rox-cli-windows
          path: tools/roxify/dist
