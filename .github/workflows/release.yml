name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake \
            qt6-base-dev libqt6svg6-dev \
            libgl-dev libvulkan-dev \
            libfuse2 file desktop-file-utils

      - name: Install roxify
        run: |
          sudo npm install -g roxify
          ROXIFY_PATH="$(sudo npm root -g)/roxify/dist/roxify_native"
          echo "ROXIFY_NATIVE=${ROXIFY_PATH}" >> $GITHUB_ENV

      - name: Extract version
        run: |
          VERSION=$(grep 'project(Pyxelze VERSION' CMakeLists.txt | grep -oP '\d+\.\d+\.\d+')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build .deb
        run: ROXIFY_NATIVE="${ROXIFY_NATIVE}" bash scripts/build_deb.sh

      - name: Build AppImage
        run: ROXIFY_NATIVE="${ROXIFY_NATIVE}" bash scripts/build_appimage.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/pyxelze_${{ env.VERSION }}_amd64.deb
            build/Pyxelze-${{ env.VERSION }}-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Install roxify
        run: |
          npm install -g roxify
          $npmRoot = npm root -g
          $roxPath = Join-Path $npmRoot "roxify\dist\roxify_native.exe"
          echo "ROXIFY_PATH=$roxPath" >> $env:GITHUB_ENV

      - name: Extract version
        run: |
          $content = Get-Content CMakeLists.txt -Raw
          $content -match 'VERSION\s+(\d+\.\d+\.\d+)'
          echo "VERSION=$($matches[1])" >> $env:GITHUB_ENV

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DROXIFY_NATIVE="$env:ROXIFY_PATH"
          cmake --build build --config Release

      - name: Deploy Qt
        run: |
          mkdir build\deploy
          copy build\Release\pyxelze.exe build\deploy\pyxelze.exe
          windeployqt build\deploy\pyxelze.exe
          if (Test-Path build\Release\roxify) {
            Copy-Item -Recurse build\Release\roxify build\deploy\roxify
          } elseif (Test-Path build\roxify) {
            Copy-Item -Recurse build\roxify build\deploy\roxify
          }

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\installer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/Pyxelze-${{ env.VERSION }}-Setup.exe

  build-macos:
    strategy:
      matrix:
        include:
          - arch: x86_64
            qt_arch: clang_64
          - arch: arm64
            qt_arch: macos
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: mac
          target: desktop
          arch: ${{ matrix.qt_arch }}

      - name: Install roxify
        run: |
          npm install -g roxify
          ROXIFY_PATH="$(npm root -g)/roxify/dist/roxify_native"
          echo "ROXIFY_NATIVE=${ROXIFY_PATH}" >> $GITHUB_ENV

      - name: Extract version
        run: |
          VERSION=$(grep 'project(Pyxelze VERSION' CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build
        run: |
          ROXIFY_OPT=""
          if [ -n "${ROXIFY_NATIVE:-}" ]; then
            ROXIFY_OPT="-DROXIFY_NATIVE=${ROXIFY_NATIVE}"
          fi
          cmake -S . -B build-macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            ${ROXIFY_OPT}
          cmake --build build-macos --config Release --parallel

      - name: Verify architecture
        run: |
          APP_PATH="build-macos/pyxelze.app"
          [ ! -d "$APP_PATH" ] && APP_PATH="build-macos/Pyxelze.app"
          EXEC=$(find "$APP_PATH/Contents/MacOS" -type f ! -name ".*" | head -1)
          echo "Binary: $EXEC"
          file "$EXEC"
          lipo -info "$EXEC"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            build-macos/pyxelze.app/
            build-macos/Pyxelze.app/

  merge-macos:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: mac
          target: desktop
          arch: macos

      - name: Install roxify
        run: |
          npm install -g roxify
          ROXIFY_PATH="$(npm root -g)/roxify/dist/roxify_native"
          echo "ROXIFY_NATIVE=${ROXIFY_PATH}" >> $GITHUB_ENV

      - name: Extract version
        run: |
          VERSION=$(grep 'project(Pyxelze VERSION' CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Download arch builds
        uses: actions/download-artifact@v4
        with:
          path: arch-builds

      - name: Create universal binary
        run: |
          # Find the app bundles
          ARM_APP=$(find arch-builds/macos-arm64 -name "*.app" -maxdepth 2 | head -1)
          X86_APP=$(find arch-builds/macos-x86_64 -name "*.app" -maxdepth 2 | head -1)
          echo "ARM app: $ARM_APP"
          echo "x86 app: $X86_APP"

          # Use the arm64 app as the base
          UNIVERSAL_APP="build-macos/Pyxelze.app"
          mkdir -p build-macos
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          # Find the main executable name
          EXEC_NAME=$(ls "$UNIVERSAL_APP/Contents/MacOS/" | grep -iv roxify | head -1)
          echo "Executable: $EXEC_NAME"

          # Merge with lipo
          lipo -create \
            "$ARM_APP/Contents/MacOS/$EXEC_NAME" \
            "$X86_APP/Contents/MacOS/$EXEC_NAME" \
            -output "$UNIVERSAL_APP/Contents/MacOS/$EXEC_NAME"

          echo "Universal binary created:"
          lipo -info "$UNIVERSAL_APP/Contents/MacOS/$EXEC_NAME"
          file "$UNIVERSAL_APP/Contents/MacOS/$EXEC_NAME"

      - name: Bundle roxify
        run: |
          APP_PATH="build-macos/Pyxelze.app"
          ROX_DEST="$APP_PATH/Contents/MacOS/roxify/roxify_native"
          if [ ! -f "$ROX_DEST" ] && [ -n "${ROXIFY_NATIVE:-}" ] && [ -f "${ROXIFY_NATIVE}" ]; then
            mkdir -p "$APP_PATH/Contents/MacOS/roxify"
            cp "${ROXIFY_NATIVE}" "$ROX_DEST"
            chmod 755 "$ROX_DEST"
          fi

      - name: Deploy Qt frameworks
        run: |
          macdeployqt "build-macos/Pyxelze.app"

      - name: Create DMG
        run: |
          APP_PATH="build-macos/Pyxelze.app"
          DMG_PATH="build-macos/Pyxelze-${VERSION}-macOS.dmg"

          # Generate DMG background
          if [ -f "scripts/create_dmg_background.py" ] && command -v python3 >/dev/null 2>&1; then
            python3 scripts/create_dmg_background.py 2>/dev/null || true
          fi

          DMG_STAGING="build-macos/dmg_staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          BG_IMG="resources/dmg_background.png"
          if [ -f "$BG_IMG" ]; then
            mkdir -p "$DMG_STAGING/.background"
            cp "$BG_IMG" "$DMG_STAGING/.background/background.png"
          fi

          hdiutil create -volname "Pyxelze" -srcfolder "$DMG_STAGING" \
            -ov -format UDZO "$DMG_PATH"
          echo "DMG created: $DMG_PATH"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build-macos/Pyxelze-${{ env.VERSION }}-macOS.dmg

  release:
    needs: [build-linux, build-windows, merge-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: |
          VERSION=$(grep 'project(Pyxelze VERSION' CMakeLists.txt | grep -oP '\d+\.\d+\.\d+')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Pyxelze v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/linux-packages/pyxelze_${{ env.VERSION }}_amd64.deb
            artifacts/linux-packages/Pyxelze-${{ env.VERSION }}-x86_64.AppImage
            artifacts/windows-installer/Pyxelze-${{ env.VERSION }}-Setup.exe
            artifacts/macos-dmg/Pyxelze-${{ env.VERSION }}-macOS.dmg
