name: Build publish_final

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Make scripts executable
        run: |
          chmod +x ./scripts/*.sh || true

      - name: Build & create publish_final
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
        run: |
          set -e
          ./scripts/rebuild_publish.sh

      - name: Inspect publish_final
        run: ls -la publish_final || true

      - name: Upload publish_final artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish_final
          path: publish_final
