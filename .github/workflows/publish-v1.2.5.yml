name: Publish macOS & Windows v1.2.5

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Install roxify
        run: |
          npm install -g roxify
          $npmRoot = npm root -g
          $roxPath = Join-Path $npmRoot "roxify\dist\roxify_native.exe"
          echo "ROXIFY_PATH=$roxPath" >> $env:GITHUB_ENV

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DROXIFY_NATIVE="$env:ROXIFY_PATH"
          cmake --build build --config Release

      - name: Deploy Qt
        run: |
          mkdir build\deploy
          copy build\Release\pyxelze.exe build\deploy\pyxelze.exe
          windeployqt build\deploy\pyxelze.exe
          if (Test-Path build\Release\roxify) {
            Copy-Item -Recurse build\Release\roxify build\deploy\roxify
          } elseif (Test-Path build\roxify) {
            Copy-Item -Recurse build\roxify build\deploy\roxify
          }

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\installer.iss

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.5
          files: build/Pyxelze-1.2.5-Setup.exe

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            suffix: arm64
          - arch: x86_64
            suffix: x86_64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: mac
          target: desktop
          arch: clang_64

      - name: Install roxify
        run: |
          npm install -g roxify
          ROXIFY_PATH="$(npm root -g)/roxify/dist/roxify_native"
          chmod +x "$ROXIFY_PATH" 2>/dev/null || true
          echo "ROXIFY_NATIVE=${ROXIFY_PATH}" >> $GITHUB_ENV

      - name: Build ${{ matrix.arch }}
        run: |
          cmake -S . -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -DROXIFY_NATIVE="${ROXIFY_NATIVE}"
          cmake --build build-release --config Release --parallel

      - name: Bundle roxify
        run: |
          APP_PATH="build-release/pyxelze.app"
          [ ! -d "$APP_PATH" ] && APP_PATH="build-release/Pyxelze.app"
          ROX_DEST="$APP_PATH/Contents/MacOS/roxify/roxify_native"
          if [ ! -f "$ROX_DEST" ] && [ -f "${ROXIFY_NATIVE}" ]; then
            mkdir -p "$APP_PATH/Contents/MacOS/roxify"
            cp "${ROXIFY_NATIVE}" "$ROX_DEST"
            chmod 755 "$ROX_DEST"
          fi

      - name: Deploy Qt frameworks
        run: |
          APP_PATH="build-release/pyxelze.app"
          [ ! -d "$APP_PATH" ] && APP_PATH="build-release/Pyxelze.app"
          macdeployqt "$APP_PATH"

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_PATH="build-release/pyxelze.app"
          [ ! -d "$APP_PATH" ] && APP_PATH="build-release/Pyxelze.app"
          DMG_PATH="build-release/Pyxelze-1.2.5-macOS-${{ matrix.suffix }}.dmg"

          create-dmg \
            --volname "Pyxelze" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "pyxelze.app" 180 200 \
            --hide-extension "pyxelze.app" \
            --app-drop-link 480 200 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$APP_PATH" \
            || true

          if [ ! -f "$DMG_PATH" ]; then
            DMG_STAGING="build-release/dmg_staging"
            mkdir -p "$DMG_STAGING"
            cp -R "$APP_PATH" "$DMG_STAGING/"
            ln -s /Applications "$DMG_STAGING/Applications"
            hdiutil create -volname "Pyxelze" -srcfolder "$DMG_STAGING" \
              -ov -format UDZO "$DMG_PATH"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.5
          files: build-release/Pyxelze-1.2.5-macOS-${{ matrix.suffix }}.dmg
